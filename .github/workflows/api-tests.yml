name: API Tests — Newman

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  api-tests:
    name: Run Newman API Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install app deps (needed if run-tests.js requires project code)
      - name: Install project dependencies
        run: npm ci

      # ── 4. Install Newman + reporters globally ─────────────────────────────
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      # ── 5. Build and Start Next.js server ───────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          PORT: 3000
          NODE_ENV: production
          MONGODB_URI:   ${{ secrets.MONGODB_URI }}
          JWT_SECRET:    ${{ secrets.JWT_SECRET }}
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          ADMIN_EMAIL:   ${{ secrets.ADMIN_EMAIL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Start Next.js server
        run: npx next start &
        env:
          PORT: 3000
          NODE_ENV: production
          MONGODB_URI:   ${{ secrets.MONGODB_URI }}
          JWT_SECRET:    ${{ secrets.JWT_SECRET }}
          EMAIL_USER:    ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:    ${{ secrets.EMAIL_PASS }}
          ADMIN_EMAIL:   ${{ secrets.ADMIN_EMAIL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      # ── 6. Wait for server to be ready ────────────────────────────────────
      - name: Wait for server (port 3000)
        run: |
          echo "Waiting for Next.js server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/faq > /dev/null 2>&1; then
              echo "✅ Server is ready!"
              break
            fi
            echo "  Attempt $i/30 — waiting 3s..."
            sleep 3
          done
          curl -f http://localhost:3000/api/faq || (echo "❌ Server failed to start" && exit 1)

      # ── 7. Run Newman tests ────────────────────────────────────────────────
      - name: Run API tests via Newman
        run: node run-tests.js
        env:
          BASE_URL:       http://localhost:3000/api
          ADMIN_EMAIL:    ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      # ── 8. Upload HTML report as artifact (always, even on failure) ────────
      - name: Upload HTML Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: test-reports/api-test-report.html
          retention-days: 14
